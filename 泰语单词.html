<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>📖 单词花园 · 泰语学习</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', system-ui, sans-serif;
            background: #f5f0eb;
            color: #2d1f1a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 1rem;
        }
        .app {
            max-width: 480px;
            width: 100%;
            background: #ffffff;
            border-radius: 32px;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.06);
            padding: 1.2rem 1.2rem 2rem;
            min-height: 90vh;
            position: relative;
        }

        /* ===== 封面页 ===== */
        .cover-page {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
            text-align: center;
            animation: fadeUp 0.8s ease;
        }
        .cover-page .cover-icon {
            font-size: 4.5rem;
            margin-bottom: 0.5rem;
            animation: float 3s ease-in-out infinite;
        }
        .cover-page h1 {
            font-size: 2.2rem;
            color: #d48c7a;
            font-weight: 700;
            letter-spacing: 2px;
        }
        .cover-page .cover-sub {
            color: #b09588;
            font-size: 1rem;
            margin-top: 0.2rem;
        }
        .cover-page .cover-desc {
            color: #b09588;
            font-size: 0.85rem;
            margin-top: 0.5rem;
            line-height: 1.6;
        }
        .cover-page .cover-desc span {
            display: inline-block;
            background: #f5ece7;
            padding: 0.1rem 0.8rem;
            border-radius: 30px;
            margin: 0.2rem 0.2rem;
            font-size: 0.78rem;
        }
        .cover-page .btn-enter {
            margin-top: 2rem;
            padding: 0.8rem 3.5rem;
            background: #d48c7a;
            border: none;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: 600;
            color: #fff;
            cursor: pointer;
            box-shadow: 0 6px 24px rgba(212, 140, 122, 0.35);
            transition: all 0.3s;
        }
        .cover-page .btn-enter:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 10px 32px rgba(212, 140, 122, 0.45);
            background: #c47a68;
        }
        .cover-page .cover-footer {
            margin-top: 2.5rem;
            font-size: 0.7rem;
            color: #c4b0a8;
        }

        @keyframes float {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-12px);
            }
        }
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ===== 主内容 ===== */
        .main-content {
            display: none;
        }
        .main-content.active {
            display: block;
            animation: fadeUp 0.5s ease;
        }

        /* ===== 顶栏 ===== */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 0.7rem;
            border-bottom: 2px solid #f0e8e3;
            margin-bottom: 1.2rem;
        }
        .top-bar .logo {
            font-size: 1.2rem;
            font-weight: 700;
            color: #d48c7a;
        }
        .top-bar .logo span {
            font-size: 1.4rem;
        }
        .top-bar .nav-icons {
            display: flex;
            gap: 0.2rem;
        }
        .top-bar .nav-icons button {
            background: none;
            border: none;
            font-size: 1.1rem;
            padding: 0.2rem 0.6rem;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.2s;
            color: #8a756d;
        }
        .top-bar .nav-icons button.active {
            background: #f5e8e3;
            color: #d48c7a;
        }
        .top-bar .admin-badge {
            font-size: 0.6rem;
            background: #fce4d4;
            color: #c27a4a;
            padding: 0.1rem 0.7rem;
            border-radius: 30px;
            display: none;
            font-weight: 500;
        }
        .top-bar .admin-badge.show {
            display: inline-block;
        }

        .page {
            display: none;
            animation: fadeUp 0.3s ease;
        }
        .page.active {
            display: block;
        }

        /* ===== 背诵 ===== */
        .study-stats {
            display: flex;
            justify-content: space-between;
            font-size: 0.78rem;
            color: #8a756d;
            margin-bottom: 0.8rem;
            padding: 0 0.2rem;
        }
        .study-stats .progress-text {
            background: #f5ece7;
            padding: 0.1rem 1rem;
            border-radius: 30px;
        }
        .study-stats .progress-text .num {
            font-weight: 600;
            color: #d48c7a;
        }
        .study-card {
            background: #fdfaf8;
            border-radius: 28px;
            padding: 2.2rem 1.5rem 1.8rem;
            text-align: center;
            min-height: 260px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 2px solid #f5ece7;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }
        .study-card:active {
            transform: scale(0.98);
        }
        .study-card .card-word {
            font-size: 2.4rem;
            font-weight: 700;
            color: #2d1f1a;
            letter-spacing: 1px;
            line-height: 1.3;
        }
        .study-card .card-phonetic {
            font-size: 0.95rem;
            color: #b09588;
            margin-top: 0.1rem;
        }
        .study-card .card-meaning {
            font-size: 1.5rem;
            color: #d48c7a;
            font-weight: 500;
            margin-top: 0.6rem;
            display: none;
            animation: fadeUp 0.3s ease;
        }
        .study-card .card-meaning.show {
            display: block;
        }
        .study-card .card-example {
            font-size: 0.85rem;
            color: #8a756d;
            background: #f5ece7;
            padding: 0.2rem 1.2rem;
            border-radius: 16px;
            margin-top: 0.5rem;
            display: none;
        }
